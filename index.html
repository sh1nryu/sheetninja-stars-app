<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>NinjaStars</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }

    #ui {
      top: 20px;
      left: 20px;
      z-index: 10;
      background-color: black;
    }

    button {
      margin-right: 10px;
      font-size: 15px;
      font-family: 'Courier New', Courier, monospace;
    }

    #title {
      background-color: black;
      color: white;
      text-align: center;
      padding: 30px;
    }

    #info {
      color: white;
      background-color: black;
      position: absolute;
      bottom: 0;
    }
  </style>

</head>

<body>
  <div id="title">Stars Visualiser</div>
  <div id="ui">
    <button id="prev">⬅ Previous 100 stars</button>
    <button style="float: right;" id="next">➡ Next 100 stars</button>
  </div>
  <script type="module">
    import * as THREE from "three"
    import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js"

    const API_URL =
      "https://api.sheetninja.io/19a6f9a429da4efc998699bdd8b001d8/ninjaStars/sheet1"

    const PAGE_SIZE = 100

    let page = 0
    let starPoints

    const scene = new THREE.Scene()

    const camera = new THREE.PerspectiveCamera(
      70,
      window.innerWidth / window.innerHeight,
      0.01,
      100
    )

    camera.position.z = 2

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)

    document.body.appendChild(renderer.domElement)

    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true

    function parseRA(ra) {
      const match = ra.match(/(\d+)h\s*(\d+)m\s*([\d.]+)s/)
      const h = Number(match[1])
      const m = Number(match[2])
      const s = Number(match[3])
      const hours = h + m / 60 + s / 3600
      return (hours / 24) * Math.PI * 2
    }

    function parseDec(dec) {
      const match = dec.match(/([+-]?\d+)°\s*(\d+)′\s*([\d.]+)″/)
      const d = Number(match[1])
      const m = Number(match[2])
      const s = Number(match[3])
      const sign = d < 0 ? -1 : 1
      const degrees = Math.abs(d) + m / 60 + s / 3600
      return (degrees * sign * Math.PI) / 180
    }

    function raDecToXYZ(ra, dec) {
      const x = Math.cos(dec) * Math.cos(ra)
      const y = Math.sin(dec)
      const z = Math.cos(dec) * Math.sin(ra)
      return { x, y, z }
    }

    function createStars(stars) {
      if (starPoints) scene.remove(starPoints)
      const positions = []
      stars.forEach(star => {

        const ra = parseRA(star.rightAscension)
        const dec = parseDec(star.declination)

        let { x, y, z } = raDecToXYZ(ra, dec)
        y += 0.2;

        positions.push(x, y, z)

      })
      const geometry = new THREE.BufferGeometry()
      geometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(positions, 3)
      )
      const material = new THREE.PointsMaterial({
        size: 0.03
      })
      starPoints = new THREE.Points(geometry, material)
      scene.add(starPoints)
    }

    async function loadPage() {
      const offset = page * PAGE_SIZE
      const res = await fetch(`${API_URL}?offset=${offset}`)
      const response = await res.json()
      console.table(response.data)
      const stars = response.data || []
      createStars(stars)
    }

    document.getElementById("next").onclick = () => {
      page++
      loadPage()
    }

    document.getElementById("prev").onclick = () => {
      if (page === 0) return
      page--
      loadPage()
    }

    loadPage()

    function animate() {

      requestAnimationFrame(animate)

      controls.update()

      renderer.render(scene, camera)

    }

    animate()

    // Handle window resize
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();  // important!

      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

  <div id="info">Star data is also logged in the console (F12)</div>
</body>

</html>
